<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดัชนีการศึกษา · ประเทศไทย รายจังหวัด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
/* คัดลอก CSS เดิมของคุณทั้งหมดมาวางที่นี่ */
:root { --bg: #f0f7ff; --white: #ffffff; --border: rgba(2,100,180,0.1); --blue: #0369a1; --blue-light: #e0f2fe; --accent: #0ea5e9; --orange: #ea580c; --green: #059669; --text: #0f172a; --text2: #334155; --muted: #64748b; --shadow: 0 1px 6px rgba(3,105,161,0.08); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.wrap { max-width:1400px; margin:0 auto; padding:20px; }
.kpi-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:24px; }
.card { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:22px; box-shadow:var(--shadow); margin-bottom:20px; }
.full { grid-column:1/-1; }
.main-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
/* ... (เพิ่ม CSS ส่วนประกอบที่เหลือของคุณที่นี่) ... */
.map-tooltip { position:absolute; padding:8px; background:rgba(0,0,0,0.8); color:#fff; border-radius:4px; font-size:12px; pointer-events:none; opacity:0; z-index:100; }
</style>
</head>
<body>
<div class="wrap">
  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="main-grid">
     <div class="card full"><div id="mapContainer" style="width:100%; height:500px;"></div></div>
     <div class="card"><div class="bar-list" id="eduBars"></div></div>
     <div class="card"><div class="bar-list" id="rankBars"></div></div>
     <div class="card full"><svg id="trendSvg" viewBox="0 0 900 240" style="width:100%"></svg></div>
     <div class="card full"><div class="tbl-wrap"><table><tbody id="tableBody"></tbody></table></div></div>
  </div>
</div>

<script>

  renderKPI(f);
  renderEduBars(f);
  renderRanking(f);
  renderTrend(f);
  renderTable(f);
  if(geojsonData) renderMap(f);
}

// โหลด Map
async function loadMapData() {
  const res = await fetch('https://cdn.jsdelivr.net/gh/apisit/thailand.json/thailand.json');
  geojsonData = await res.json();
  render();
}

// โปรดตรวจสอบให้แน่ใจว่าฟังก์ชันเหล่านี้ไม่ได้ถูกลบทิ้งไป

</body>
</html>
