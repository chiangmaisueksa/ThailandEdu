<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดัชนีการศึกษา · ประเทศไทย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* คุมโทน สีน้ำเงิน ฟ้า ขาว */
:root {
  --bg: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --blue-dark: #1e3a8a;
  --blue-main: #2563eb;
  --blue-light: #dbeafe;
  --blue-pale: #eff6ff;
  --highlight: #ea580c; /* สีส้มสำหรับไฮไลต์เปรียบเทียบ */
  --muted: #64748b;
  --shadow: 0 4px 15px rgba(37, 99, 235, 0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--blue-dark); min-height:100vh; }

.wrap { max-width:1440px; margin:0 auto; padding:24px; }

/* ── Header ── */
.header { 
  display:flex; justify-content:space-between; align-items:flex-end; 
  padding-bottom:20px; border-bottom:2px solid var(--blue-light); margin-bottom:20px; 
}
h1 { font-size:32px; font-weight:700; color:var(--blue-dark); }
h1 em { font-style:normal; color:var(--blue-main); }
.export-btn {
  background:var(--blue-main); color:var(--white); border:none; padding:10px 20px;
  border-radius:8px; font-family:'Sarabun'; font-weight:600; cursor:pointer;
  transition:0.2s; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow);
}
.export-btn:hover { background:#1d4ed8; transform:translateY(-2px); }

/* ── Filter Bar ── */
.filter-bar {
  display: flex; gap: 16px; flex-wrap: wrap; background: var(--white);
  padding: 16px 20px; border-radius: 12px; box-shadow: var(--shadow);
  border: 1px solid var(--border); margin-bottom: 24px; position: relative; z-index: 10;
}
.filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
.filter-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
.filter-group select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-family: 'Sarabun'; font-size: 14px; color: var(--blue-dark);
  outline: none; background: var(--bg); cursor: pointer;
}
.filter-group select:focus { border-color: var(--blue-main); }

/* ── Layout ── */
.dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.left-col, .right-col { display:flex; flex-direction:column; gap:24px; }
@media(max-width:1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

/* ── Card ── */
.card { 
  background:var(--white); border:1px solid var(--border); 
  border-radius:12px; padding:20px; box-shadow:var(--shadow); 
}
.card-title { 
  font-size:16px; font-weight:600; margin-bottom:16px; 
  display:flex; justify-content:space-between; align-items:center; color:var(--blue-dark);
}
.tag { 
  font-family:'IBM Plex Mono'; font-size:11px; background:var(--blue-pale); 
  color:var(--blue-main); padding:4px 8px; border-radius:6px; border: 1px solid var(--blue-light);
}

/* ── Bars & Chart ── */
.bar-item { margin-bottom:12px; }
.bar-meta { display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px; }
.bar-track { height:8px; background:var(--blue-pale); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; background:var(--blue-light); transition: 0.5s; }
.bar-fill.highlight { background:var(--blue-main); }
.text-highlight { font-weight:700; color:var(--blue-main); }

svg { width:100%; height:auto; }
.loading { text-align:center; padding:40px; color:var(--blue-main); font-weight:600; }
</style>
</head>
<body>

<div class="wrap" id="dashboardArea">
  <header class="header">
    <div>
      <h1>ดัชนีการศึกษา <em>รายจังหวัด</em></h1>
      <p style="color:var(--muted); margin-top:4px;">วิเคราะห์ปีการศึกษาเฉลี่ยและระดับการศึกษา (พ.ศ. 2561–2568)</p>
    </div>
    <button class="export-btn" onclick="exportDashboard()">📸 ดาวน์โหลดรายงาน</button>
  </header>

  <div class="filter-bar" id="filterBar" style="display:none;">
    <div class="filter-group">
      <label>📅 ปี พ.ศ. (สำหรับแผนที่และจัดอันดับ)</label>
      <select id="yearSel"></select>
    </div>
    <div class="filter-group">
      <label>📍 จังหวัดที่ต้องการเปรียบเทียบ</label>
      <select id="provSel"></select>
    </div>
    <div class="filter-group">
      <label>👥 กลุ่มอายุเป้าหมาย</label>
      <select id="ageSel">
        <option value="a1559" selected>15-59 ปี (วัยแรงงาน)</option>
        <option value="a1539">15-39 ปี (วัยรุ่นและวัยทำงานตอนต้น)</option>
        <option value="a4059">40-59 ปี (วัยทำงานตอนปลาย)</option>
        <option value="a15up">15 ปีขึ้นไป (ภาพรวม)</option>
        <option value="s60">60 ปีขึ้นไป (ผู้สูงอายุ)</option>
      </select>
    </div>
  </div>

  <div id="loadingStatus" class="loading">กำลังโหลดข้อมูลจาก ThailandEdu.csv...</div>

  <div class="dashboard-grid" id="mainContent" style="display:none;">
    <div class="left-col">
      <div class="card">
        <div class="card-title">
          📍 การกระจายตัวปีการศึกษาเฉลี่ยรายพื้นที่ (Heatmap)
          <span class="tag" id="mapTag">ปีล่าสุด</span>
        </div>
        <div id="map" style="width: 100%; height: 350px; border-radius: 8px; z-index: 1;"></div>
      </div>

      <div class="card">
        <div class="card-title">📈 แนวโน้มปีการศึกษาเฉลี่ย (เปรียบเทียบ)</div>
        <svg id="trendSvg" viewBox="0 0 800 240"></svg>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="card-title">🏆 10 อันดับสูงสุด <span class="tag" id="rankTag"></span></div>
        <div id="rankBars"></div>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = [];
let geoJsonData = null;
let map = null;
let geoLayer = null;

// สถานะการกรองเริ่มต้น
let activeProv = "เชียงใหม่"; 
let activeYear = ""; 
let activeAge = "a1559";

const AGE_LABELS = {
  "a1539": "15-39 ปี",
  "a1559": "15-59 ปี",
  "a4059": "40-59 ปี",
  "a15up": "15 ปีขึ้นไป",
  "s60": "60 ปีขึ้นไป"
};

// 1. โหลดข้อมูล
Papa.parse("ThailandEdu.csv", {
  download: true,
  header: true,
  dynamicTyping: true,
  complete: function(results) {
    DATA = results.data.map(row => {
      return {
        pt: row["จังหวัดในภาษาไทย"],
        y: row["ปี"],
        a1539: row["ร้อยละ ปีการศึกษาเฉลี่ยของประชากร 15-39 ปี (หน่วย: ปี)"],
        a1559: row["ร้อยละ ปีการศึกษาเฉลี่ยของประชากร 15-59 ปี (หน่วย: ปี)"],
        a4059: row["ร้อยละ ปีการศึกษาเฉลี่ยของประชากร 40-59 ปี (หน่วย: ปี)"],
        a15up: row["ร้อยละ ปีการศึกษาเฉลี่ยของประชากร 15 ปีขึ้นไป (หน่วย: ปี)"],
        s60: row["ร้อยละ ปีการศึกษาเฉลี่ยของประชากร 60 ปีขึ้นไป (หน่วย: ปี)"]
      };
    }).filter(d => d.pt && d.y);

    document.getElementById('loadingStatus').style.display = 'none';
    document.getElementById('filterBar').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'grid';
    
    initFilters();
    initMap();
    updateDashboard();
  },
  error: function(err) {
    document.getElementById('loadingStatus').innerText = "เกิดข้อผิดพลาดในการโหลดไฟล์ CSV";
  }
});

// 2. จัดการตัวกรอง (Dropdown)
function initFilters() {
  const years = [...new Set(DATA.map(d => d.y))].sort((a,b) => b - a);
  const provs = [...new Set(DATA.map(d => d.pt))].filter(p => p !== 'ประเทศไทย').sort();

  const ySel = document.getElementById('yearSel');
  ySel.innerHTML = `<option value="">ปีล่าสุด (${years[0]})</option>` + 
                   years.map(y => `<option value="${y}">${y}</option>`).join('');

  const pSel = document.getElementById('provSel');
  pSel.innerHTML = provs.map(p => `<option value="${p}" ${p===activeProv?'selected':''}>${p}</option>`).join('');

  // ผูก Event เมื่อเปลี่ยนค่า
  document.getElementById('yearSel').addEventListener('change', (e) => { activeYear = e.target.value; updateDashboard(); });
  document.getElementById('provSel').addEventListener('change', (e) => { activeProv = e.target.value; updateDashboard(); });
  document.getElementById('ageSel').addEventListener('change', (e) => { activeAge = e.target.value; updateDashboard(); });
}

// 3. ฟังก์ชันอัปเดตกราฟทั้งหมด
function updateDashboard() {
  renderRanking();
  renderTrend();
  if (geoJsonData) updateMapLayer();
}

// 4. วาดกราฟแท่งจัดอันดับ
function renderRanking() {
  const targetYear = activeYear ? parseInt(activeYear) : Math.max(...DATA.map(d => d.y));
  const yearData = DATA.filter(d => d.y === targetYear && d.pt !== 'ประเทศไทย' && d[activeAge] != null);
  
  const sorted = yearData.sort((a,b) => parseFloat(b[activeAge]) - parseFloat(a[activeAge])).slice(0, 10);
  
  if (!sorted.some(d => d.pt === activeProv)) {
    const targetData = yearData.find(d => d.pt === activeProv);
    if(targetData) sorted.push(targetData);
  }

  const maxV = sorted.length ? parseFloat(sorted[0][activeAge]) : 1;
  document.getElementById('rankBars').innerHTML = sorted.map((d, i) => {
    const isTarget = d.pt === activeProv;
    return `
    <div class="bar-item">
      <div class="bar-meta">
        <span class="${isTarget ? 'text-highlight' : ''}">${i+1}. ${d.pt}</span>
        <span style="font-family:'IBM Plex Mono'; font-weight:600;">${d[activeAge]} ปี</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${isTarget ? 'highlight' : ''}" style="width:${(d[activeAge]/maxV*100)}%"></div>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('rankTag').innerText = `ปี ${targetYear} | ${AGE_LABELS[activeAge]}`;
}

// 5. วาดกราฟเส้น
function renderTrend() {
  const svg = document.getElementById('trendSvg');
  svg.setAttribute('viewBox', '0 0 800 240'); 

  const YEARS = [...new Set(DATA.map(d => d.y))].sort((a,b) => a - b);
  const plotProvinces = [activeProv, 'กรุงเทพมหานคร', 'ประเทศไทย']; 
  
  let svgContent = '';
  const W = 800, H = 240, PT = 20, PB = 40, PL = 50, PR = 80;
  
  const allVals = DATA.filter(d => plotProvinces.includes(d.pt) && d[activeAge] != null)
                      .map(d => parseFloat(d[activeAge]))
                      .filter(v => !isNaN(v));

  const minV = allVals.length ? Math.floor(Math.min(...allVals)) - 0.5 : 5;
  const maxV = allVals.length ? Math.ceil(Math.max(...allVals)) + 0.5 : 12;
  
  const xs = i => PL + (i * ((W - PL - PR) / Math.max(1, YEARS.length - 1)));
  const ys = v => PT + ((maxV - v) / (maxV - minV) * (H - PT - PB));

  YEARS.forEach((y, i) => {
    svgContent += `<text x="${xs(i)}" y="${H - 15}" text-anchor="middle" fill="#64748b" font-family="IBM Plex Mono" font-size="12">${y}</text>`;
  });

  plotProvinces.forEach((prov, index) => {
    const isTarget = prov === activeProv;
    const isTH = prov === 'ประเทศไทย';
    const strokeColor = isTarget ? '#2563eb' : (isTH ? '#1e3a8a' : '#93c5fd');
    const strokeWidth = isTarget ? 4 : 2;
    
    let path = '';
    let isFirstPoint = true; 
    let lastPoint = null;

    YEARS.forEach((y, i) => {
      const d = DATA.find(item => item.pt === prov && item.y === y);
      if(d && d[activeAge] != null) {
        const val = parseFloat(d[activeAge]);
        if(!isNaN(val)) {
          const px = xs(i); const py = ys(val);
          path += (isFirstPoint ? `M ${px},${py}` : ` L ${px},${py}`);
          isFirstPoint = false;
          svgContent += `<circle cx="${px}" cy="${py}" r="${isTarget ? 5 : 3}" fill="${strokeColor}"></circle>`;
          lastPoint = { x: px, y: py, val: val };
        }
      }
    });
    
    const dash = isTH ? 'stroke-dasharray="6,4"' : '';
    if(path !== '') {
      svgContent += `<path d="${path}" fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" ${dash}></path>`;
    }
    if (lastPoint) {
       // ขยับแกน Y ของ Label ไม่ให้ซ้อนกัน
       let labelY = lastPoint.y + 4;
       if (index > 0) labelY += (index * 2); 
       svgContent += `<text x="${lastPoint.x + 12}" y="${labelY}" fill="${strokeColor}" font-weight="${isTarget ? 'bold' : 'normal'}" font-size="12">${prov}</text>`;
    }
  });

  svg.innerHTML = svgContent;
}

// 6. ตั้งค่าแผนที่ครั้งแรก
function initMap() {
  map = L.map('map').setView([13.736717, 100.523186], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 20
  }).addTo(map);

  fetch('https://raw.githubusercontent.com/chingchai/OpenGISData-Thailand/master/provinces.geojson')
    .then(r => r.json())
    .then(data => {
      geoJsonData = data;
      updateMapLayer();
    });
}

// 7. อัปเดตสีและไฮไลต์บนแผนที่
function updateMapLayer() {
  if(geoLayer) map.removeLayer(geoLayer);

  const targetYear = activeYear ? parseInt(activeYear) : Math.max(...DATA.map(d => d.y));
  const yearData = DATA.filter(d => d.y === targetYear);
  document.getElementById('mapTag').innerText = `ปี ${targetYear} | ${AGE_LABELS[activeAge]}`;

  // หาสเกลสีแบบอัตโนมัติ ตามกลุ่มอายุ
  const vals = yearData.map(d => parseFloat(d[activeAge])).filter(v => !isNaN(v));
  const maxV = vals.length ? Math.max(...vals) : 12;
  const minV = vals.length ? Math.min(...vals) : 4;
  const range = maxV - minV;

  function getDynamicColor(d) {
    if(!d) return '#f1f5f9';
    const pct = (d - minV) / range;
    if(pct > 0.8) return '#1e3a8a';
    if(pct > 0.6) return '#2563eb';
    if(pct > 0.4) return '#60a5fa';
    if(pct > 0.2) return '#93c5fd';
    return '#dbeafe';
  }

  geoLayer = L.geoJson(geoJsonData, {
    style: function (feature) {
      const provName = feature.properties.pro_th; 
      const provData = yearData.find(d => d.pt === provName);
      const val = provData && provData[activeAge] ? parseFloat(provData[activeAge]) : 0;
      const isTarget = provName === activeProv; // เช็กว่าเป็นจังหวัดเป้าหมายหรือไม่

      return {
        fillColor: getDynamicColor(val),
        weight: isTarget ? 3 : 1,             // ถ้าเป็นจังหวัดที่เลือก ให้เส้นขอบหนา
        color: isTarget ? '#ea580c' : 'white', // สีขอบสีส้ม ถ้าถูกเลือก
        fillOpacity: 0.85
      };
    },
    onEachFeature: function (feature, layer) {
      const provName = feature.properties.pro_th;
      const provData = yearData.find(d => d.pt === provName);
      const val = provData && provData[activeAge] ? provData[activeAge] + " ปี" : "ไม่มีข้อมูล";
      
      // ตั้งค่า Popup
      layer.bindPopup(`<div style="text-align:center; font-family:'Sarabun'">
        <b>${provName}</b><br>
        <span style="color:#2563eb; font-weight:bold;">${val}</span><br>
        <small style="color:#64748b">(คลิกเพื่อเปรียบเทียบ)</small>
      </div>`);

      // ทำให้กดที่แผนที่แล้วค่า Dropdown/กราฟเปลี่ยนตาม
      layer.on('click', function() {
        document.getElementById('provSel').value = provName;
        activeProv = provName;
        updateDashboard();
      });
    }
  }).addTo(map);
}

function exportDashboard() {
  const target = document.getElementById('dashboardArea');
  const btn = document.querySelector('.export-btn');
  btn.style.display = 'none'; 
  html2canvas(target, { backgroundColor: '#f8fafc', scale: 2, useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Education_Index_${activeProv}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.style.display = 'flex'; 
  });
}
</script>
</body>
</html>
